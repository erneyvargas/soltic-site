name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write   # necesario para OIDC
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::277352717286:role/personal-site-github-deploy
  S3_BUCKET: erney-personal-site-2026
  CLOUDFRONT_ID: ES8FNO8HMQSCC

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync app/dist/ "s3://${{ env.S3_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html"
          # HTML sin caché agresivo para que updates salgan rápido
          aws s3 cp app/dist/index.html "s3://${{ env.S3_BUCKET }}/index.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_ID }}" \
            --paths "/*"

      - name: Summary
        run: |
          echo "### Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Bucket: \`${{ env.S3_BUCKET }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- CloudFront: \`${{ env.CLOUDFRONT_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://d11b2hq3pithnt.cloudfront.net" >> $GITHUB_STEP_SUMMARY
